<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../styles/registro/style.css">
    <link rel="stylesheet" href="../styles/registro/tablet.css" media="(min-width:600px)">
    <link rel="stylesheet" href="../styles/registro/desktop.css" media="(min-width:900px)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=Fjalla+One&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=David+Libre:wght@400;500;700&family=Fjalla+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <a href="../index.html"><img src="../assets/back.png" alt="imagen logo de una cabeza de gladiador romano"></a>
        <h2>Roman Colosseum</h2>
        <span></span>
    </header>
    <main>
        <section class="main--registro">
            <h2 class="registro__titulo">Registro</h2>
            <form action="" class="registro__formulario">
                <label for="nombreRegistro">
                    Nombre
                    <input type="text" name="nombreRegistro" required id="nombreRegistro">
                </label>

                <label for="correoRegistro">
                    Correo
                    <input type="email" name="correoRegistro" id="correoRegistro" required>
                </label>
                <label for="claveRegistro">
                    Contraseña
                    <input type="password" name="claveRegistro" id="claveRegistro" required >
                </label>
                <label for="nacimientoRegistro">
                    Nacimiento
                    <input type="date" name="nacimientoRegistro" id="nacimientoRegistro" required>
                </label>

                <label class="formulario--sexo" for="sexoRegistro">
                    <p>Sexo</p>
                    <div class="sexo__seleccion">
                        Mujer
                        <input type="radio" name="sexoRegistro" id="sexoRegistro" value="mujer" required>
                        Hombre
                        <input type="radio" name="sexoRegistro" id="sexoRegistro" value="hombre" required>
                    </div>
                </label>
                <input id="submitRegistro" value="Registrarme" name="submitRegistro" type="submit">
            </form>
        </section>
    </main>
    <script src="../scrips/registro.js"></script>
</body>

</html>
