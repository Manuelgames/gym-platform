<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion</title>
    <link rel="stylesheet" href="../styles/ingreso/style.css">
    <link rel="stylesheet" href="../styles/ingreso/tablet.css" media="(min-width:600px)">
    <link rel="stylesheet" href="../styles/ingreso/desktop.css" media="(min-width:900px)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=Fjalla+One&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=David+Libre:wght@400;500;700&family=Fjalla+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <a href="../index.html"><img src="../assets/back.png" alt="imagen logo de una cabeza de gladiador romano"></a>
        <h2>Roman Colosseum</h2>
        <span></span>
    </header>
    <main>
        <section class="main--ingreso">
            <h2 class="ingreso__titulo">Inicia tu aventura</h2>
            <form action="" class="ingreso__formulario">
                <label for="correoIngreso">
                    Correo
                    <input type="text" name="correoIngreso" id="correoIngreso">
                </label>
                <label for="claveIngreso">
                    Contraseña
                    <input type="password" name="claveIngreso" id="claveIngreso">
                </label>
                <div class="seleccion__alterna">
                    <label><a href="">Olvidaste tu Contraseña</a></label>
                    <label><a href="">Crear una cuenta nueva</a></label>
                </div>
            </form>
        </section>
        <div class="container--ingreso__button">
            <button>Iniciar</button>
        </div>
    </main>
</body>

</html>
